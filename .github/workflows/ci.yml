name: CI

# Enforces the checks listed in CONTRIBUTING.md. Runs on PRs into main and on pushes to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A newer push to the same branch/PR cancels in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  frontend:
    name: Frontend (Vitest + svelte-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # `.svelte-kit/` is gitignored. `svelte-kit sync` regenerates it (incl. the tsconfig that
      # ./tsconfig.json extends) so the type-check has what it needs on a fresh checkout.
      - name: Sync SvelteKit
        run: npx svelte-kit sync
      - name: Unit tests
        run: npm test
      - name: Type-check
        run: npm run check

  rust:
    name: Rust (fmt + clippy + tests)
    # macOS is required: the keyring `apple-native` feature pulls in Apple-only frameworks.
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      # `tauri::generate_context!()` embeds the built frontend at compile time. Neither `.svelte-kit/`
      # nor `build/` is committed, so build the SPA on a fresh checkout before any cargo step —
      # `vite build` runs `svelte-kit sync` and writes the static output to `build/` (frontendDist).
      - name: Build frontend (creates ../build for generate_context!)
        working-directory: .
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test
