name: CI

# Enforces the checks listed in CONTRIBUTING.md. Runs on PRs into main and on pushes to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A newer push to the same branch/PR cancels in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Vitest + svelte-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Type-check
        run: npm run check

  rust:
    name: Rust (fmt + clippy + tests)
    # macOS is required: the keyring `apple-native` feature pulls in Apple-only frameworks.
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      # `tauri::generate_context!()` embeds the built frontend at compile time, so `../build`
      # must exist before clippy/test can compile the crate.
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Build frontend (for generate_context!)
        working-directory: .
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test
